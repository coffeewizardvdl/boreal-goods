<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boreal Goods — My Plants</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e3326">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Boreal">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #2d4a35;
      --forest-deep: #1e3326;
      --forest-light: #4a7c59;
      --bark: #6b4c2a;
      --bark-light: #a07850;
      --cream: #f7f2eb;
      --fog: #e8e0d4;
      --charcoal: #3f3c38;
      --mist: #c8d4c0;
      --gold: #c9a84c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background-color: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.6;
    }

    .forest-bar { background: var(--forest-deep); height: 5px; width: 100%; }

    header {
      padding: 2rem 1.5rem 1.2rem;
      text-align: center;
      position: relative; z-index: 1;
    }

    .logo-wordmark { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .logo-trees { width: 72px; height: auto; margin-bottom: 0.4rem; opacity: 0.9; }
    .logo-boreal { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.5rem; letter-spacing: 0.18em; color: var(--forest-deep); text-transform: uppercase; }
    .logo-goods { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.8rem; letter-spacing: 0.35em; color: var(--bark); text-transform: uppercase; }
    .logo-divider { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
    .logo-divider-line { width: 28px; height: 1px; background: var(--bark-light); }
    .logo-diamond { width: 5px; height: 5px; background: var(--bark-light); transform: rotate(45deg); }
    .logo-tagline { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.6rem; letter-spacing: 0.3em; color: var(--bark-light); text-transform: uppercase; }

    main {
      flex: 1; padding: 0 1.2rem 3rem;
      position: relative; z-index: 1;
      max-width: 520px; margin: 0 auto; width: 100%;
    }

    .section-divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--forest-light), transparent);
      margin: 0 auto 1.8rem;
    }

    /* ── Page title ── */
    .page-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 600;
      color: var(--forest-deep);
      margin-bottom: 0.3rem;
    }
    .page-sub {
      font-size: 0.8rem; font-weight: 300;
      color: var(--bark-light); margin-bottom: 1.8rem;
      letter-spacing: 0.03em;
    }

    /* ── States ── */
    #loading-state, #empty-state, #error-state { text-align: center; padding: 3rem 1rem; }

    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--fog);
      border-top-color: var(--forest); border-radius: 50%;
      margin: 0 auto 1rem; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-msg { font-size: 0.85rem; color: var(--mist); font-weight: 300; letter-spacing: 0.04em; }
    .state-msg a { color: var(--bark-light); text-decoration: underline; text-underline-offset: 3px; }

    /* ── Planter cards ── */
    #planters-list { display: flex; flex-direction: column; gap: 1rem; }

    .planter-card {
      background: white; border: 1px solid var(--fog);
      border-radius: 12px; overflow: hidden;
      animation: fadeUp 0.4s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .planter-header {
      padding: 1.2rem 1.4rem 1rem;
      border-bottom: 1px solid var(--fog);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
    }

    .planter-icon { font-size: 1.8rem; margin-right: 0.8rem; flex-shrink: 0; }

    .planter-info { flex: 1; }
    .planter-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; color: var(--forest-deep); margin-bottom: 0.2rem;
    }
    .planter-meta {
      font-size: 0.75rem; color: var(--bark-light);
      font-weight: 300; letter-spacing: 0.03em;
    }
    .planter-meta span { color: var(--forest); font-weight: 500; }

    .planter-id-badge {
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--mist);
      background: var(--cream); border: 1px solid var(--fog);
      border-radius: 4px; padding: 0.2rem 0.5rem; flex-shrink: 0;
      align-self: flex-start; margin-top: 0.2rem;
    }

    /* ── Care tip ── */
    .planter-tip {
      margin: 0 1.4rem 0;
      background: #f0f5f1; border: 1px solid var(--mist);
      border-left: 3px solid var(--forest-light); border-radius: 6px;
      padding: 0.7rem 0.9rem; font-size: 0.78rem; color: var(--forest);
      font-weight: 300; line-height: 1.55;
    }
    .planter-tip-label {
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--forest-light);
      display: block; margin-bottom: 0.2rem;
    }

    /* ── Next watering ── */
    .next-watering {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.8rem 1.4rem;
      background: #f7fbf8; border-bottom: 1px solid var(--fog);
    }
    .next-watering-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--forest-light); flex-shrink: 0;
    }
    .next-watering-dot.overdue { background: #c0392b; }
    .next-watering-dot.today   { background: var(--gold); }
    .next-watering-label {
      font-size: 0.78rem; font-weight: 300; color: var(--bark);
    }
    .next-watering-label strong {
      font-weight: 500; color: var(--charcoal);
    }

    /* ── History toggle ── */
    .history-toggle {
      width: 100%; padding: 0.85rem 1.4rem;
      background: none; border: none; border-top: 1px solid var(--fog);
      font-family: 'Jost', sans-serif; font-size: 0.78rem; font-weight: 400;
      color: var(--bark-light); letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; text-align: left; display: flex;
      align-items: center; justify-content: space-between;
      transition: background 0.15s;
    }
    .history-toggle:hover { background: #faf8f5; }
    .toggle-arrow { transition: transform 0.25s; font-size: 0.7rem; }
    .toggle-arrow.open { transform: rotate(180deg); }

    /* ── History list ── */
    .history-panel {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .history-panel.open { max-height: 600px; }

    .history-inner { padding: 0 1.4rem 1rem; }

    .history-item {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.7rem 0; border-bottom: 1px solid var(--fog);
    }
    .history-item:last-child { border-bottom: none; }
    .history-drop { font-size: 1.1rem; flex-shrink: 0; }
    .history-date { font-size: 0.85rem; font-weight: 500; color: var(--charcoal); }
    .history-sub  { font-size: 0.72rem; color: var(--bark-light); font-weight: 300; }

    .history-empty {
      padding: 1rem 0; font-size: 0.82rem;
      color: var(--mist); font-weight: 300; text-align: center;
    }

    /* ── Sign out ── */
    .signout-wrap {
      text-align: center; margin-top: 2rem;
    }
    .signout-btn {
      background: none; border: none; font-family: 'Jost', sans-serif;
      font-size: 0.75rem; color: var(--mist); cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px; letter-spacing: 0.05em;
    }
    .signout-btn:hover { color: var(--bark-light); }

    footer {
      padding: 1.5rem; text-align: center; font-size: 0.68rem;
      color: var(--mist); letter-spacing: 0.1em; text-transform: uppercase;
      position: relative; z-index: 1;
    }
    footer a { color: var(--bark-light); text-decoration: none; }
  </style>
</head>
<body>

<div class="forest-bar"></div>

<header>
  <div class="logo-wordmark">
    <svg class="logo-trees" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <polygon points="20,65 35,30 50,65" fill="#2d4a35" opacity="0.7"/>
      <rect x="32" y="65" width="6" height="10" fill="#6b4c2a" opacity="0.8"/>
      <polygon points="45,65 60,10 75,65" fill="#1e3326"/>
      <rect x="57" y="65" width="6" height="12" fill="#6b4c2a"/>
      <polygon points="70,65 85,32 100,65" fill="#2d4a35" opacity="0.7"/>
      <rect x="82" y="65" width="6" height="10" fill="#6b4c2a" opacity="0.8"/>
      <path d="M55,12 Q60,6 65,12" stroke="#4a7c59" stroke-width="1.5" fill="none" opacity="0.8"/>
      <path d="M51,10 Q60,2 69,10" stroke="#4a7c59" stroke-width="1.5" fill="none" opacity="0.5"/>
    </svg>
    <div class="logo-boreal">Boreal</div>
    <div class="logo-goods">Goods</div>
    <div class="logo-divider">
      <div class="logo-divider-line"></div>
      <div class="logo-diamond"></div>
      <div class="logo-divider-line"></div>
    </div>
    <div class="logo-tagline">Made in the North</div>
  </div>
</header>

<main>
  <div class="section-divider"></div>

  <h1 class="page-heading">My Plants</h1>
  <p class="page-sub" id="page-sub">Your planters and watering history.</p>

  <!-- Loading -->
  <div id="loading-state">
    <div class="spinner"></div>
    <p class="state-msg">Loading your plants…</p>
  </div>

  <!-- Error / not signed in -->
  <div id="error-state" style="display:none;">
    <p class="state-msg" id="error-msg">Something went wrong. <a href="/water.html">Return to planter</a></p>
  </div>

  <!-- Empty -->
  <div id="empty-state" style="display:none;">
    <p class="state-msg">No planters found yet.<br>Tap your planter to get started.</p>
  </div>

  <!-- Planters -->
  <div id="planters-list" style="display:none;"></div>

  <div class="signout-wrap" id="signout-wrap" style="display:none;">
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </div>
</main>

<footer>
  <a href="https://borealgoods.ca" target="_blank">borealgoods.ca</a>
  &nbsp;·&nbsp; Edmonton, Alberta
</footer>

<script>
  // ─── Plant tip database (subset for lookup)
  const PLANT_TIPS = {
    'pothos':            'Let the soil dry out between waterings — it\'s more forgiving than you think.',
    'snake plant':       'One of the most drought-tolerant houseplants. Less water is almost always better.',
    'peace lily':        'Will droop slightly when thirsty — a helpful signal before you even check the soil.',
    'spider plant':      'Prefers to dry out a little between waterings. Thrives in indirect light.',
    'zz plant':          'Stores water in its roots — overwatering is the most common mistake.',
    'monstera':          'Water when the top inch of soil is dry. Loves humidity.',
    'fiddle leaf fig':   'Sensitive to inconsistent watering. Try to water on a regular schedule.',
    'rubber plant':      'Allow the top layer of soil to dry before watering again.',
    'aloe vera':         'A true succulent — water deeply but infrequently and ensure good drainage.',
    'boston fern':       'Loves moisture. Check soil every couple of days and never let it fully dry out.',
    'philodendron':      'Water when the top inch of soil feels dry. Yellowing leaves mean overwatering.',
    'calathea':          'Prefers consistently moist soil and high humidity. Use filtered water if possible.',
    'dracaena':          'Sensitive to fluoride in tap water. Let water sit overnight before using.',
    'jade plant':        'A succulent that prefers deep, infrequent watering. Allow soil to dry completely.',
    'cactus':            'Water deeply but infrequently. In winter, once a month may be enough.',
    'orchid':            'Water at the roots, not the leaves. Let dry slightly between waterings.',
    'lavender':          'Drought-tolerant once established. Overwatering is the #1 killer.',
    'basil':             'Thirsty and fast-growing. Water when the top of the soil feels dry to the touch.',
    'rosemary':          'Drought-tolerant once established. Prefers to dry out between waterings.',
    'tomato':            'Consistent watering is key — irregular moisture causes blossom end rot.',
    'monstera deliciosa':'Water when the top inch of soil is dry. Loves humidity.',
    'prayer plant':      'Keep soil consistently moist and provide high humidity for best results.',
    'money tree':        'Water thoroughly then allow soil to dry out completely before watering again.',
    'air plant':         'Mist 2–3 times a week or soak for 20 minutes weekly. Shake off excess.',
    'hoya':              'Tolerates drought well. Let soil dry between waterings for best results.',
  };

  function getTip(plantName) {
    return PLANT_TIPS[plantName.toLowerCase().trim()] || null;
  }

  // ─── Cookie helpers
  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[1]) : null;
  }
  function setCookie(name, value, days) {
    const expires = new Date();
    expires.setDate(expires.getDate() + days);
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires.toUTCString()}; path=/; SameSite=Lax`;
  }

  function getSessionToken() { return getCookie('bg_session'); }

  // ─── Next watering calculation
  function nextWatering(lastWateredUTC, daysFreq) {
    const last = new Date(lastWateredUTC.replace(' ', 'T') + 'Z');
    const next = new Date(last);
    next.setDate(next.getDate() + daysFreq);
    const now  = new Date();
    const diffMs   = next - now;
    const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    if (diffDays < 0)  return { label: 'Overdue by ' + Math.abs(diffDays) + ' day' + (Math.abs(diffDays) === 1 ? '' : 's'), status: 'overdue' };
    if (diffDays === 0) return { label: 'Due today', status: 'today' };
    if (diffDays === 1) return { label: 'Due tomorrow', status: 'soon' };
    return { label: 'Due in ' + diffDays + ' days', status: 'ok' };
  }

  // ─── Build a planter card
  function buildCard(p, index) {
    const tip  = getTip(p.plant_name);
    const next = p.last_watered ? nextWatering(p.last_watered, p.days_freq) : null;
    const lastDate = p.last_watered
      ? new Date(p.last_watered.replace(' ', 'T') + 'Z').toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' })
      : 'Never';

    const card = document.createElement('div');
    card.className = 'planter-card';
    card.style.animationDelay = (index * 0.08) + 's';

    card.innerHTML = `
      <div class="planter-header">
        <div style="display:flex;align-items:flex-start;">
          <div class="planter-icon">🌿</div>
          <div class="planter-info">
            <div class="planter-name">${escHtml(p.plant_name)}</div>
            <div class="planter-meta">
              Watered every <span>${p.days_freq} day${p.days_freq === 1 ? '' : 's'}</span>
              &nbsp;·&nbsp; Last watered <span>${lastDate}</span>
            </div>
          </div>
        </div>
        <div class="planter-id-badge">${escHtml(p.planter_id)}</div>
      </div>

      ${next ? `
      <div class="next-watering">
        <div class="next-watering-dot ${next.status}"></div>
        <div class="next-watering-label"><strong>${next.label}</strong></div>
      </div>` : ''}

      ${tip ? `
      <div class="planter-tip" style="margin-top:1rem;">
        <span class="planter-tip-label">Care tip</span>
        ${escHtml(tip)}
      </div>` : ''}

      <button class="history-toggle" data-id="${escHtml(p.planter_id)}">
        <span>Watering history (${p.history.length})</span>
        <span class="toggle-arrow">▼</span>
      </button>

      <div class="history-panel" id="history-${escHtml(p.planter_id)}">
        <div class="history-inner">
          ${p.history.length === 0
            ? '<div class="history-empty">No waterings logged yet.</div>'
            : p.history.map(h => {
                const d    = new Date(h.tapped_at.replace(' ', 'T') + 'Z');
                const date = d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
                const time = d.toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' });
                return `<div class="history-item">
                  <span class="history-drop">💧</span>
                  <div>
                    <div class="history-date">${date}</div>
                    <div class="history-sub">${time} · every ${h.days_freq} day${h.days_freq === 1 ? '' : 's'}</div>
                  </div>
                </div>`;
              }).join('')
          }
        </div>
      </div>
    `;

    // History toggle
    card.querySelector('.history-toggle').addEventListener('click', function() {
      const panel = document.getElementById('history-' + this.dataset.id);
      const arrow = this.querySelector('.toggle-arrow');
      panel.classList.toggle('open');
      arrow.classList.toggle('open');
    });

    return card;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Show/hide helpers
  function showOnly(id) {
    ['loading-state','error-state','empty-state','planters-list'].forEach(s => {
      document.getElementById(s).style.display = s === id ? (id === 'planters-list' ? 'flex' : 'block') : 'none';
    });
  }

  // ─── Load dashboard
  async function load() {
    const session = getSessionToken();
    if (!session) {
      document.getElementById('error-msg').innerHTML = 'You\'re not signed in. <a href="/water.html">Tap your planter to sign in.</a>';
      showOnly('error-state');
      return;
    }

    try {
      const res  = await fetch('/api/get-planters.php', {
        headers: { 'X-Session-Token': session },
      });
      const data = await res.json();

      if (!data.ok) {
        document.getElementById('error-msg').innerHTML = 'Session expired. <a href="/water.html">Tap your planter to sign in again.</a>';
        showOnly('error-state');
        return;
      }

      if (!data.planters.length) {
        showOnly('empty-state');
        return;
      }

      const list = document.getElementById('planters-list');
      list.innerHTML = '';
      data.planters.forEach((p, i) => list.appendChild(buildCard(p, i)));

      // Update subtitle with count
      document.getElementById('page-sub').textContent =
        data.planters.length === 1 ? '1 planter registered.' : data.planters.length + ' planters registered.';

      showOnly('planters-list');
      document.getElementById('signout-wrap').style.display = 'block';

    } catch (e) {
      document.getElementById('error-msg').innerHTML = 'Couldn\'t load your plants. <a href="/water.html">Return to planter.</a>';
      showOnly('error-state');
    }
  }

  // ─── Sign out
  document.getElementById('signout-btn').addEventListener('click', () => {
    setCookie('bg_session', '', -1);
    setCookie('bg_email', '', -1);
    window.location.href = '/water.html';
  });

  // ─── Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  load();
</script>
</body>
</html>
